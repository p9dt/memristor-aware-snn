name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt

      - name: Unit tests
        run: python -m pytest -q

      - name: Integration smoke (train + memristor eval on a tiny subset)
        run: |
          python -m src.train --epochs 1 --num-steps 10 --limit-batches 20
          python -m src.eval_memristor --limit-batches 20 --trials 2
